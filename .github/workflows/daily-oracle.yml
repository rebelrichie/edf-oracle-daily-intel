name: EarthDaily Oracle Daily Brief
on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python edf_oracle/main.py
        env:
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: oracle-brief
          path: daily_brief.pdf
      - uses: actions/upload-artifact@v4
        with:
          name: hubspot-csv
          path: hubspot_import.csv
