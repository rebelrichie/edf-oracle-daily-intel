name: Daily BD Intel Brief

on:
  schedule:
    - cron: '0 11 * * 1-5'   # 7am ET Mon-Fri (UTC-4). Change to '0 12' for EST winter.
  workflow_dispatch:           # lets you trigger manually from GitHub UI anytime

jobs:
  generate-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests feedparser pandas jinja2 groq weasyprint

      - name: Install WeasyPrint system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libcairo2 libgdk-pixbuf2.0-0

      - name: Generate brief
        env:
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python generate_brief.py

      - name: Send email
        env:
          SEND_TO: ${{ secrets.BRIEF_EMAIL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python send_brief.py

      - name: Upload PDF as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: daily-brief-${{ github.run_id }}
          path: |
            daily_brief.pdf
            hubspot_import.csv
          retention-days: 7
